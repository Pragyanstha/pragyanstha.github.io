name: Gatsby Publish

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      uses: actions/checkout@v1
      uses: actions/setup-node@v2.2.0
      run: npm i --save
      run: npm run build
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
